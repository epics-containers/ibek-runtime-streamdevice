#######################################################################
#
# This protocol file is for use with StreamDevice-2-0 (i.e. epics 3.14)
#
#######################################################################
#
# Stream Device Protocol for Oxford Instruments Mercury iTC Temperature Controller
# Using the SCPI command set
#

terminator   = LF;
replytimeout = 2000;
separator    = "";

#################################################################################

# System commands

# stringin
READ_IDENT {
  ExtraInput = Ignore;
  out "*IDN?";
  in  "IDN:%40c";
}
###################################

# stringout
SET_TIME {
  out "SET:SYS:TIME:%s";
}

# stringin
READ_TIME {
  ExtraInput = Ignore;
  out "READ:SYS:TIME";
  in  "STAT:SYS:TIME:%12c";
}

##################################

# stringin
READ_DATE {
  ExtraInput = Ignore;
  out "READ:SYS:DATE";
  in  "STAT:SYS:DATE:%12c";
}
#################################

# stringin
READ_HVER {
  ExtraInput = Ignore;
  out "READ:SYS:MAN:HVER";
  in  "STAT:SYS:MAN:HVER:%12c";
}

# stringin
READ_FVER {
  ExtraInput = Ignore;
  out "READ:SYS:MAN:FVER";
  in  "STAT:SYS:MAN:FVER:%12c";
}

# stringin
READ_SERL {
  ExtraInput = Ignore;
  out "READ:SYS:MAN:SERL";
  in  "STAT:SYS:MAN:SERL:%12c";
}

#################################

# MBBI
READ_MODE {
    out "READ:SYS:MODE"; 
    in  "STAT:SYS:MODE:%{NORM|ENG|INVALID}";
}

# MBBO
SET_MODE {
    out "SET:SYS:MODE:%{NORM|ENG}";
    @init { read_mode; }
}

#################################

# analogue in
READ_FLSH {
  out "READ:SYS:FLSH";
  in  "STAT:SYS:FLSH:%f";
}

#################################

# MBBI
READ_DIMA {
  out "READ:SYS:DISP:DIMA";
  in  "STAT:SYS:DISP:DIMA:%{OFF|ON}";
}

# MBBO
SET_DIMA {
    out "SET:SYS:DISP:DIMA:%{OFF|ON}";
    @init { read_dima; }
}

#################################

# analogue out
SET_DIMT {
  out "SET:SYS:DISP:DIMT:%f";
}

# analogue in
READ_DIMT {
  out "READ:SYS:DISP:DIMT";
  in  "STAT:SYS:DISP:DIMT:%f";
}

###################################

# analogue out
SET_BRIG {
  out "SET:SYS:DISP:BRIG:%f";
}

# analogue in
READ_BRIG {
  ExtraInput = Ignore;
  out "READ:SYS:DISP:BRIG";
  in  "STAT:SYS:DISP:BRIG:%f";
}

####################################

# stringin
READ_CAT {
  ExtraInput = Ignore;
  out "READ:SYS:CAT";
  in  "STAT:SYS:CAT:%255c";
}

#################################################


