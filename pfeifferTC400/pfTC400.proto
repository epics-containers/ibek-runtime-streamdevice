# **********************************************************************************************
# There is some sort of procedure to confirm the factory set rotation speed.
# The manual has a warning that if it is not confirmed, you will get an error code and
# also that if this is incorrect for the pump model, damage can be caused.
#
getNomSpdConf     { out "\$10077702=?%Q"    ; in "\$11077706%6u%*3u" }

# **********************************************************************************************
# * Parameter 797 RS485Addr   RS-485 device address                       Datatype 1 Access RW *
# **********************************************************************************************
# Read the unit number.
#
# This protocol cannot work without knowing the unit number, it is a chicken-and-egg situation.
# You need to address the unit number in the message telegram in order to get a reply.  If you
# address it as part of group, it will accept commands, but will not reply - according to the
# telegram page in the manual.
#

# Use this to check have the correct unit number.
getUnitAddress     { out "\$10079702=?%Q"   ; in "\$11079706%6u%*3u" }

# Use this to see if we have the default unit address value of 001.
getUnitAddressDflt { out "0010079702=?%Q"   ; in "0011079706%6u%*3u" }

# Use this to pass on a guess at what unit number might be and see if we get any reply.
# Might have to step through 001 to 255 to get a reply.
queryUnitAddress   { out "%03u0079702=?%Q"  ; in "%*3u1079706%6u%*3u" }

# **********************************************************************************************
# * Generic read/write of a given parameter number of different Datatypes                      *
# **********************************************************************************************
#
# Requested as a feature by vacuum group so they have a record they can poke to read and set
# stuff not explicitly referenced in the protocol.
#
# These are implemented in conjuction with a calcout or an scalcout record, so the items in
# brackets refer to calc record field names.  The out protocols all have a reference to field A
# which should contain the parameter number to be queried.  In the reply we eat the parameter
# number and the checksum converting the value into an appropriate field.
#

getParamDatatype0  { out "\$100%(A)03u02=?%Q" ; in "\$110%*3u06%(B)1b%*5b%*3u" }
getParamDatatype1  { out "\$100%(A)03u02=?%Q" ; in "\$110%*3u06%(B)6u%*3u"     }
getParamDatatype2  { out "\$100%(A)03u02=?%Q" ; in "\$110%*3u06%(B)6u%*3u"     }
getParamDatatype4  { out "\$100%(A)03u02=?%Q" ; in "\$110%*3u06%(AA)#6s%*3u"   }
getParamDatatype7  { out "\$100%(A)03u02=?%Q" ; in "\$110%*3u03%(B)3u%*3u"     }

# This one is listed as a datatype in the manual, but we dont seem to have any examples of them
# and I think there might be a typo in the manual in the format.  Reluctant to implement this
# without any means to provoke the controller to give a valid example to verify the format.  If
# the format given is correct it will be horrid to implement from an EPICS record because the
# multiplier and the power (you know, the mantissa and the wotsit) will have to be handled
# separately and the decimal point dealt with, all of which is unnatural to EPICS which uses the
# different formats interchangably.  The most natural way to deal with this would probably be
# to write another custom converter flag.  Alternatively a calc or scalc would be involved.
#getParamDatatype10 { out "\$100%(A)03u02=?%Q"  ; in "" }

# This one is listed as a datatype in the manual, but we dont seem to have any examples of them.
getParamDatatype11 { out "\$100%(A)03u02=?%Q" ; in "\$110%*3u16%(AA)#16s%*3u" }

# Set the datatypes and eat the valid acknowlegement replies.
#
setParamDatatype0  { out "\$110%(A)03u06%(C)1b%(C)1b%(C)1b%(C)1b%(C)1b%(C)1b%Q" ; 
                                                       in "\$110%*3u06%*6b%*3u"  }
setParamDatatype1  { out "\$110%(A)03u06%(C)06u%Q"   ; in "\$110%*3u06%*6u%*3u"  }
setParamDatatype2  { out "\$110%(A)03u06%(C)06u%Q"   ; in "\$110%*3u06%*6u%*3u"  } 

# This one requires use of scalcout with stream DTYP for which we do not yet have support.
#setParamDatatype4  { out "\$110%(A)03u06%(AA)#6s%Q"  ; in "\$110%*3u06%*6s%*3u"  }

setParamDatatype7  { out "\$110%(A)03u03%(C)03u%Q"   ; in "\$110%*3u03%*3u%*3u"  }

# Not bothering with datatype10.

# This one requires use of scalcout with stream DTYP for which we do not yet have support.
#setParamDatatype11 { out "\$110%(A)03u16%(AA)#16s%Q" ; in "\$110%*3u16%*16s%*3u" }

# **********************************************************************************************
# * Parameter 099         Non-existent parameter                       Datatype N/A Access N/A *
# **********************************************************************************************
# Attempt to deliberately provoke an error response to test error response handling by querying
# a parameter not in the list, which presumably does not exist.  Unfortunately it might exist for
# internal use or something like that.
#

# Treat it as datatype 1, so an error string response will not parse.
getTestError       { out "\$10009902=?%Q"   ; in "\$11009906%6u%*3u" }

