# END OF STATUS REQUEST PARAMETERS
# (Numbers in range 300 to 399)
# ##############################################################################################
# START OF SET VALUE SETTING PARAMETERS
# (Numbers in range 700 to 799)
#
# In a setting protocol, we must parse, but eat the echoed response.
# If it is an error response instead it won't parse and will jump to
# the global mismatch handler which can deal with an error telegram,
# and tries to deal with garbage, but might not succeed.  When dealing
# with setting strings, be careful about forcing the parse to fail if
# it is an error response, because an error telegram has very similar
# structure to a valid command echo telegram.
#

# **********************************************************************************************
# * Parameter 700 RUTimeSVal  Set value run up time                       Datatype 1 Access RW *
# **********************************************************************************************
# Read/write the set value run up time, units of minutes.
#
getRUTimeSVal      { out "\$10070002=?%Q"   ; in "\$11070006%6u%*3u"  }
setRUTimeSVal      { out "\$11070006%06u%Q" ; in "\$11070006%*6u%*3u" }

