################################################################################################
# Protocol file for:
#
# VICI E2CA series 2 position valve actuator
#
# Protocol assumes no ID has been set for the controller (i.e. single controller on an RS232 line)
# Default serial configuration: 9600 baud, no parity, 8 data bits, 1 stop bit.
#
################################################################################################

Terminator = CR;

LockTimeout = 3000;
ReplyTimeout = 3000;
ReadTimeout = 1000;
ExtraInput = Ignore;


##################
# commands

# Move valve to position A
# Cmd: 'CW\r' Resp: none
setPosA { out "CW"; }

# Move valve to position B
# Cmd: 'CC\r' Resp: none
setPosB { out "CC"; }

# Move valve to position A or B
# Cmd: 'GOx\r' Resp: none
setPos { out "GO%{A|B}"; }

# Read valve move counter
# Cmd: 'CNT\r' Resp: 'CNT = <int>\r'
getCnt { out "CNT"; in "CNT = %u"; }

# Read valve position
# Cmd: 'CP\r' Resp: 'Position is A|B\r' or  'Position is "A|B"\r' (with quotes)
#getPos { out "CP"; in "Position is %{A|B}"; }
getPos { out "CP"; in "Position is %#{A=0|\"A=0|B=1|\"B=1}"; }

# Read software status info
# Cmd: 'VR\r' Resp: 'I-PD-EDF56RC.7\r08/19/2010\r'  (NB \r in middle of response)
getInfo { out "VR"; in "%s"; in "%(\$1.VAL)s"; }

