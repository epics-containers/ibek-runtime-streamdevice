# Imported from DLS production support module: mks937b 2-97
# Source: /dls_sw/prod/R3.14.12.7/support/mks937b/2-97
# Pristine copy of the StreamDevice protocol + EPICS db/template from that release.
# To check for updates: diff this pattern's files against that path, or against the
# newest /dls_sw/prod/*/support/mks937b/ release.

module: mks937b

entity_models:
  - name: mks937b
    description: |-
      Template database for an MKS937B Multi-Sensor System (vacuum gauge
      controller) read over StreamDevice.
    parameters:
      device:
        type: str
        description: |-
          Device name
      port:
        type: str
        description: |-
          Asyn Port name, e.g. ty_40_0
      address:
        type: int
        description: |-
          Controller address (001 .. 253)
      name:
        type: id
        description: |-
          Object and gui association name
    databases:
      - file: mks937b.template
        args:
          .*:
