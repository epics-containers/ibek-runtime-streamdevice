# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: thermocube

entity_models:
  - name: thermoCube
    description: |-
      ThermoCube chiller
    parameters:
      P:
        type: str
        description: |-
          PV name prefix
      R:
        type: str
        description: |-
          PV name suffix
      PORT:
        type: str
        description: |-
          asyn port
      name:
        type: id
        description: |-
          module name
    databases:
      - file: thermocube.template
        args:
          .*:
