# Communication protocol file for thermo cube
# Mateusz Hoppe
# 2021


InTerminator = "";
OutTerminator = '\r';

ReplyTimeout = 1000;
WriteTimeout = 1000;
ReadTimeout  = 1000;

setTemperature         { out 0xE1 "%#.2r"; }

getSetpointTemperature { out 0xC1; in "%#02r"}
getActualTemperature   { out 0xC9; in "%#02r"}


start 	  { out 0xE0; }
stop 	  { out 0xA0; }