# newest /dls_sw/prod/*/support/HostLink/ release.

module: HostLink

entity_models:
  - name: HostLink
    description: |-
      HostLink FINS protocol module (loads the stream protocol file)
  - name: HostLinkTemplate
    description: |-
      Omron PLC HostLink FINS communications status and clock readbacks
    parameters:
      device:
        type: str
        description: |-
          Device name / PV prefix
      port:
        type: str
        description: |-
          asyn port name
    databases:
      - file: HostLink.template
        args:
          .*:
