# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: OXCryo

entity_models:
  - name: OXPH700
    description: |-
      Control for Oxford cryostream 700 series (Phenix)
    parameters:
      P:
        type: str
        description: |-
          Device Prefix
      Q:
        type: str
        description: |-
          Device suffix
      PORT:
        type: str
        description: |-
          Asyn port to connect to
      name:
        type: id
        description: |-
          Object and gui association name
      CTEMP_MIN:
        type: float
        description: |-
          macro to set minimum target temperature
        default: 80.0
      CTEMP_MAX:
        type: float
        description: |-
          macro to set maximum target temperature
        default: 327.67
      DISABLE_COMMS:
        type: int
        description: |-
          Optional macro to control whether comms are disabled (1) or not (0) on startup. Defaults to disabled
        default: 1
      CTEMP_DRVL:
        type: float
        description: |-
          macro to set CTEMP.DRVL
      CTEMP_DRVH:
        type: float
        description: |-
          macro to set CTEMP.DRVH
    databases:
      - file: OXPH700.template
        args:
          .*:

