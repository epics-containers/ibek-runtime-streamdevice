# Communication protocol file for Celeroton Chopper
# Mateusz Hoppe
# 2019

# choose one of the following:
Terminator = ;       # to use with real device
#Terminator = CR LF;  # to use with builded simulator

ReplyTimeout = 10;
WriteTimeout = 10;
ReadTimeout  = 10;


# ===============================================================================================================
# CONTROL SIGNALS (START/STOP/STATUS/ERROR SUPPORT)
# ===============================================================================================================

start 	  { out 0x02 0x02 0xFC; in 0x02 0x02 0xFC; }
stop 	  { out 0x02 0x03 0xFB; in 0x02 0x03 0xFB; }
getStatus {	out 0x02 0x00 0xFE;	in  0x12 0x00 "%(\$1:ERROR_CODE_1)#4r%(\$1:ERROR_CODE_2)#4r%(\$1:WARNING_CODE)#4r%(\$1:INFO_CODE)#4r%<negsum>"; }
ackErrors {	out 0x0A 0x01 "%(\$1:ERROR_CODE_1)#.4r%(\$1:ERROR_CODE_2)#.4r%<negsum>"; in  0x02 0x01 0xFD; }
sendZeros {	out 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00 0x00; }

@replytimeout { sendZeros; }
@readtimeout  { sendZeros; }
@writetimeout { sendZeros; }
@mismatch     { sendZeros; }

# ===============================================================================================================
# READ/WRITE VARIABLES
# ===============================================================================================================

getReferenceSpeed         {	out 0x03 0x04 0x00 "%<negsum>";           in 0x07 0x04 0x03 "%#4r%<negsum>"; }
setReferenceSpeed         {	out 0x08 0x05 0x00 0x03 "%#.4r%<negsum>"; in 0x02 0x05 0xF9; }

getPhaseInductance        { out 0x03 0x04 0x0F "%<negsum>";           in 0x07 0x04 0x05 "%#4R%<negsum>"; }
setPhaseInductance        { out 0x08 0x05 0x0F 0x05 "%#.4R%<negsum>"; in 0x02 0x05 0xF9; }

getPolePairs              { out 0x03 0x04 0x09 "%<negsum>";           in 0x07 0x04 0x02 "%#4r%<negsum>"; }
