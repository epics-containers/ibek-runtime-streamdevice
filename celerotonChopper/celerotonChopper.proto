getDCLinkCurrent 	{ out 0x03 0x04 0x02 "%<negsum>"; in 0x07 0x04 0x01 "%#4r%<negsum>"; }
getCurrentReference { out 0x03 0x04 0x03 "%<negsum>"; in 0x07 0x04 0x01 "%#4r%<negsum>"; }
getOutputPower 		{ out 0x03 0x04 0x06 "%<negsum>"; in 0x07 0x04 0x01 "%#4r%<negsum>"; }
getConverterTemp 	{ out 0x03 0x04 0x04 "%<negsum>"; in 0x07 0x04 0x01 "%#4r%<negsum>"; }
