# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

# Imported from DLS production support module: VCH10Light 1-1
# Source: /dls_sw/prod/R3.14.12.7/support/VCH10Light/1-1
# Pristine copy of the StreamDevice protocol + EPICS db/template from that release.
# To check for updates: diff this pattern's files against that path, or against the
# newest /dls_sw/prod/*/support/VCH10Light/ release.

module: VCH10Light

entity_models:
  - name: VCH10Light
    description: |-
      Template database for a VCH-10 Light Controller.  Typically used on End Stations to illuminate one or more vacuum chambers.  All the lights are turned on/off together.
    parameters:
      P:
        type: str
        description: |-
          Mandatory.  Device prefix
      port:
        type: str
        description: |-
          Mandatory.  Asyn serial port
      description:
        type: str
        description: |-
          Optional.   Defaults to ES Chamber Lights.  Description of the controller for use on GUI - e.g. chambers illuminated.
        default: ES Chamber Lights
      shortdesc:
        type: str
        description: |-
          Optional.   Defaults to Lights.             Short description to appear in GUI text.
        default: Lights
      name:
        type: id
        description: |-
          Optional.   Defaults to VCH-10.             Object name and associated gui name.
    databases:
      - file: VCH10Light.template
        args:
          .*:
