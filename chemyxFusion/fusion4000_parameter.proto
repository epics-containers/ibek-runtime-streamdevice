# Communication protocol file for fusion Pump 4000
# Omar Elamin & Mateusz Hoppe
# 2021


OutTerminator = CR LF;
InTerminator = LF;

ReplyTimeout = 100;
WriteTimeout = 100;
ReadTimeout  = 100;


getUnits1 {
    out "view parameter";
    in "view parameter\r";
    in " ";
    in "\rPump 1: ";
    in "\runit = %d ";
    in "\rdia = %*f ";
    in "\rrate = %*f ";
    in "\rtime = %*f ";
    in "\rvolume = %*f ";
    in "\rdelay = %*d ";
    in "\rPump 2: ";
    in "\runit = %*d ";
    in "\rdia = %*f ";
    in "\rrate = %*f ";
    in "\rtime = %*f ";
    in "\rvolume = %*f ";
    in "\rdelay = %*d";
}

