module: mitsubishiRobot

entity_models:
  - name: BARTRobot
    description: |-
      Mitsubishi BART sample-changing robot - reads PLC DM memory blocks over
      a FINS port and exposes robot control over StreamDevice.
    parameters:
      P:
        type: str
        description: |-
          Device Prefix
      PORT:
        type: str
        description: |-
          Fins port (Asyn Port)
      STREAMS_PORT:
        type: str
        description: |-
          Stream port (Asyn Port)
      dom:
        type: str
        description: |-
          Beamline Domain
      name:
        type: id
        description: |-
          Object and gui association name
    databases:
      - file: BARTRobot.db
        args:
          .*:
