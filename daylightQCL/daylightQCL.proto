# Protocol file for Daylight Solutions QCL
# Benjamin Bradnick
# 07/09/2017

InTerminator = LF CR;
OutTerminator = LF;

ReplyTimeout = 1000;
WriteTimeout = 200;
ReadTimeout = 200;

# Laser current (milliAmps)
getLaserCurrent {
    out ":LASER:CURR?";
    in "%i%*s";
}
setLaserCurrent {
    out ":LASER:CURR %i";
}
getMeasuredLaserCurrent {
    out ":LASER:CURR:SENSE?";
    in "%f%*s";
}
getMeasuredLaserTecCurrent {
    out ":LASER:TEC:CURR?";
    in "%f%*s";
}

# Interlock
getInterlockStatus {
    out ":LASER:ILOCK?";
    in "%i";
}

# Temperatures
getCaseTemp {
    out ":LASER:TEMP:CASE?";
    in "%f%*s";
}
getLaserTemp {
    out ":LASER:TEMP:SENSE?";
    in "%f%*s";
}
getLaserTempSetpoint {
    out ":LASER:TEMP:REL?";
    in "%f";
}
setLaserTempSetpoint {
    out ":LASER:TEMP:REL";
}

# Laser properties
getLaserWavelength {
    out ":LASER:SET?";
    in "%f%*s";
}
setLaserWavelength {
    out ":LASER:SET %f";
}
getMeasuredLaserWavelength {
    out ":LASER:POS?";
    in "%f%*s";
}
getLaserOutput {
    out ":LASER:OUTP?";
    in "%i";
}
setLaserOutput {
    out ":LASER:OUTP %i";
}
getLaserTrigDelay {
    out ":LASER:TRIG:DELAY?";
    in "%f%*s";
}

