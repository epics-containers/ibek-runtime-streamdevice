getR2SetpointDelay {
    out STX $addr "\x31\x37\x33" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x37\x33" 0x30 "%06d" ETX "%01<xor>";
}
setR2SetpointDelay {
    out STX $addr "\x31\x37\x33" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
