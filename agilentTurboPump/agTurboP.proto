#*********************************************
#	*Protocol File*
#*********************************************

# Agilent Turbomolecular Pump, model TwisTorr 305-IC / 305-FS

# Protocol file: agTurboP.proto
# Developed by: Gregory Gay, 
#   rev1.0: May 2021, serial commands for 305-IC on-board controller
#   rev2.0: January 2022, serial commands for 305-FS remote controller

#############################################
# COMMUNICATION FORMAT

# 8 data bit
# no parity
# 1 stop bit
# baud rate: from 600 to 9600 programmable

#############################################
# STREAM DEVICE PROTOCOL

# Message format is:
#      "<STX>"+"<ADDR>"+"<WIN>"+"<COM>"+"<DATA>"+"<ETX>"+"<CRC>"
# where
#	<STX>	: Start of transmission (1 byte) = 0x02
#	<ADDR>	: Unit address in hex (1 byte) = 0x80 (+ device number for RS485, 0 to 31)
#	<WIN>	: Window number corresponding to specific commands (3 bytes) = string of 3 numeric characters in hex ('000' to '999')
#	<COM>	: Command (1 byte) = 0x30 to read the window, 0x31 to write into the window
#	<DATA>	: Data to be written into the window, not present for reading command = 1, 6 or 10 bytes in hex according to the data type (respectively logic, numeric and alphanumeric data types)
#	<ETX>	: End of transmission (1 byte) = 0x03
#	<CRC>	: XOR of all characters subsequent to <STX> and including the <ETX> terminator,
#           hexadecimal coded and indicated by two ASCII characters
#
# Reply format is:
#      "<STX>"+"<ADDR>"+"<ANSW>"+"<ETX>"+"<CRC>"
# where
#	<STX>	: Start of transmission (1 byte) = 0x02
#	<ADDR>	: Unit address in hex (1 byte) = 0x80 (+ device number for RS485, 0 to 31)
#   <ANSW>  : Answer whose structure will depend on the data type of the message = 1, 6 or 10 bytes
#	<ETX>	: End of transmission (1 byte) = 0x03
#	<CRC>	: XOR of all characters subsequent to <STX> and including the <ETX> terminator,
#           hexadecimal coded and indicated by two ASCII characters

#############################################
#SPECIFIC CONTROLLER RESPONSES
#
# 0x06 - ACK - successful execution
# 0x15 - NAK - failed execution
# 0x32 - not a valid window
# 0x33 - wrong data type for the given window
# 0x34 - out of range value
# 0x35 - read-only / temporarily disabled window

#############################################
#COMMAND EXAMPLES
#
# getPump {
#     out "\x02\x80\x30\x30\x30\x30\x03%01<xor>";
#     in "\x02\x80\x30\x30\x30\x30%{0|1}\x03%01<xor>";
# }
# setPump {
#     out "\x02\x80\x30\x30\x30\x31%x\x03%01<xor>";
#     in "\x02\x80%x\x03%01<xor>";
# }

#############################################
#SYSTEM VARIABLES

Terminator = "";
ExtraInput = Ignore;
LockTimeout = 5000;
WriteTimeout = 100;
ReplyTimeout = 2000;
ReadTimeout = 20;

#############################################
#PROTOCOL ARGUMENTS
# first (and only) parameter passed to the command is the desired value

#############################################
#USER VARIABLES

#address field of the device in hexadecimal
#[0x80] for RS232 communication, [0x80 + device number] for RS485 communication
addr = "\x80";

#############################################
#REQUESTS AND ANSWERS

###############
##### Active commands related to the running mode of the pump

# Start/Stop command
# (read only in remote/Front mode for the FS model)
# value = 0 for Stop, 1 for Start
# factory default = Stop
# data format: 1 byte
# (use bi/bo record)
getPump {
    out STX $addr "\x30\x30\x30" 0x30 ETX "%01<xor>";
    in STX $addr "\x30\x30\x30" 0x30 "%{0|1}" ETX "%01<xor>";
}
setPump {
    out STX $addr "\x30\x30\x30" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getPump; }
}

# Controller configuration
# (operating mode of the controller: serial port, rear panel, front panel or profibus port)
# (additionnal Front and Profibus modes for the FS model)
# value = 0 for Serial, 1 for Remote, 2 for Front, 3 for Profibus
# factory default = Remote
# data format: 1 byte
# (use mbbi/mbbo record)
getController {
    out STX $addr "\x30\x30\x38" 0x30 ETX "%01<xor>";
    in STX $addr "\x30\x30\x38" 0x30 "%{0|1|2|3}" ETX "%01<xor>";
}
setController {
    out STX $addr "\x30\x30\x38" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getController; }
}

# Low speed activation command
# value = 0 for Off, 1 for On
# factory default = Off
# data format: 1 byte
# (use bi/bo record)
getLowSpeed {
    out STX $addr "\x30\x30\x31" 0x30 ETX "%01<xor>";
    in STX $addr "\x30\x30\x31" 0x30 "%{0|1}" ETX "%01<xor>";
}
setLowSpeed {
    out STX $addr "\x30\x30\x31" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getLowSpeed; }
}

# Soft Start command
# (write only in Stop condition)
# (Serial controller configuration required for IC model, Front mode required for FS model)
# value = 0 for Disable, 1 for Enable
# factory default = Enable at the first START, then Disable
# data format: 1 byte
# (use bi/bo record)
getSoftStart {
    out STX $addr "\x31\x30\x30" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x30" 0x30 "%{0|1}" ETX "%01<xor>";
}
setSoftStart {
    out STX $addr "\x31\x30\x30" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getSoftStart; }
}

# Gas Load Type configuration
# (selects the type of gas used in the process)
# (combination of gas type and temperature reading will make the controller limit the power supplied to the pump)
# value = 0 for molar_mass>=30g/mol (e.g. Ar), 1 for 4g/mol<molar_mass<30g/mol (e.g. N2)
#       2 for molar_mass<=4g/mol (e.g.H2, He)

# factory default = 0
# data format: 6 bytes
# (use mbbi/mbbo record)
getGasType {
    out STX $addr "\x31\x35\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x35\x37" 0x30 "\x30\x30\x30\x30\x30%{0|1|2}" ETX "%01<xor>";
}
setGasType {
    out STX $addr "\x31\x35\x37" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGasType; }
}

# Active Stop configuration
# (enables/disables the stop with active braking, i.e. uses the motor to brake the pump)
# (available to FS model only and write in Stop condition only)
# value = 0 for Disable, 1 for Enable
# factory default =  Disable
# data format: 1 byte
# (use bi/bo record)
getActiveStop {
    out STX $addr "\x31\x30\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x37" 0x30 "%{0|1}" ETX "%01<xor>";
}
setActiveStop {
    out STX $addr "\x31\x30\x37" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getActiveStop; }
}

# Stop Speed Reading configuration
# (reading of the pump rotational speed during the slowing phase that follows a stop command)
# (write only in Stop condition for IC model, any for FS model)
# value = 0 for Disable, 1 for Enable
# factory default = 1 for IC model, 0 for FS model
# data format: 1 byte
# (use bi/bo record)
getStopRead {
    out STX $addr "\x31\x36\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x36\x37" 0x30 "%{0|1}" ETX "%01<xor>";
}
setStopRead {
    out STX $addr "\x31\x36\x37" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getStopRead; }
}


###############
##### Active commands related to the relay R1
##### (used with programmable analog output on logic output connector J1, pins 11/4)

# R1 Setpoint type configuration
# (selects the type of reference measurement to drive the relay R1)
# (e.g. driving frequency of the pump, power supplied to the pump, time from the start, achievement of normal condition, or pressure read by the gauge (if present))
# (pressure type available only for FS model and only if the gauge is connected) 
# value = 0 for Frequency, 1 for Power, 2 for Time, 3 for Normal, 4 for Pressure
# factory default = Frequency for IC model, Normal for FS model
# data format: 6 bytes
# (use mbbi/mbbo record)
getR1SetpointType {
    out STX $addr "\x31\x30\x31" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x31" 0x30 "\x30\x30\x30\x30\x30%{0|1|2|3|4}" ETX "%01<xor>";
}
setR1SetpointType {
    out STX $addr "\x31\x30\x31" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getR1SetPointType; }
}

# R1 Setpoint logic configuration
# (control logic activation type for the setpoint output signal)
# (positive logic = the relay is energized when the measurement exceeds the reference)
# (negative logic = the relay is energized when the measurement is below the reference)
# ("high-level active" indicates the output is ON when the signal is above the threshold)
# value = 0 for High-level active, 1 for Low-level active
# factory default = High-level
# data format: 1 byte
# (use bi/bo record)
getR1SetpointLogic {
    out STX $addr "\x31\x30\x34" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x34" 0x30 "%{0|1}" ETX "%01<xor>";
}
setR1SetpointLogic {
    out STX $addr "\x31\x30\x34" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getR1SetpointLogic; }
}

# R1 Setpoint Threshold configuration
# (reference value at which the relay R1 is activated; not available in Normal mode (WIN101))
# value = from 0 to 99999 for the IC model, expressed in Hz/W/sec
# value = from 0 to 999999 for the FS model, expressed in Hz/W/sec/mbar
# factory default = 720 for the IC model, 867 for the FS model
# data format: 6 bytes
# (use ai/ao record)
getR1SetpointThreshold {
    out STX $addr "\x31\x30\x32" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x32" 0x30 "%06d" ETX "%01<xor>";
}
setR1SetpointThreshold {
    out STX $addr "\x31\x30\x32" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getR1SetpointThreshold; }
}

# R1 Setpoint Delay configuration
# (time between the pump start and the setpoint check)
# (mask time within which the setpoint is not driven even if the threshold value has been reached)
# (not available in Normal mode (WIN101))
# value = from 0 to 999999 seconds
# factory default = 0
# data format: 6 bytes
# (use ai/ao record)
getR1SetpointDelay {
    out STX $addr "\x31\x30\x33" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x33" 0x30 "%06d" ETX "%01<xor>";
}
setR1SetpointDelay {
    out STX $addr "\x31\x30\x33" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getR1SetpointDelay; }
}

# R1 Setpoint Hysteresis configuration
# value = from 0 to 100, expressed in % of the R1 threshold value
# factory default = 2
# data format: 6 bytes
# (use ai/ao record)
getR1SetpointHysteresis {
    out STX $addr "\x31\x30\x35" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x35" 0x30 "%06d" ETX "%01<xor>";
}
setR1SetpointHysteresis {
    out STX $addr "\x31\x30\x35" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init {getR1SetpointHysteresis; }
}

# R1 Setpoint State command
# (read-only, reports the actual state of the setpoint output)
# (only available for the IC model)
# value = 0 for Off (not yet reached), 1 for On (reached)
# read format: 1 byte
# (use bi record)
getR1SetpointState {
    out STX $addr "\x32\x32\x31" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x32\x31" 0x30 "%{0|1}" ETX "%01<xor>";
}

# R1 Setpoint Pressure Threshold command
# (read-only, reports the actual pressure setpoint value if WIN101 is set to Pressure)
# (only available for the FS model with the Gauge connected)
# value = X.X EsXX with X= 0 to 9 and s= + or -)
# read format: 10 bytes
# (use stringin record)
getR1PressureSetpoint {
    out STX $addr "\x31\x36\x32" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x36\x32" 0x30 "%10c" ETX "%01<xor>";
}


###############
##### Active commands related to the relay R2
##### (used with programmable analog output on logic output connector J1, pins 14/7)

