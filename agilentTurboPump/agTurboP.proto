###############
##### Active commands related to the excitation frequency

# Maximum Frequency configuration
# (defines the maximum frequency settable by WIN120)
# (command available for IC model only)
# value = from 700 to 1010 Hz
# factory default = 1010
# data format: 6 bytes
# (use ai/ao record)
getMaxFrequency {
    out STX $addr "\x31\x32\x31" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x32\x31" 0x30 "%06d" ETX "%01<xor>";
}
setMaxFrequency {
    out STX $addr "\x31\x32\x31" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getMaxFrequency; }
}

# Low Speed Frequency configuration
# (sets the desired rotational speed of the pump in low-speed mode)
# value = from 700 to 1010 Hz
# factory default = 700
# data format: 6 bytes
# (use ai/ao record)
getLowSpeedFrequency {
    out STX $addr "\x31\x31\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x31\x37" 0x30 "%06d" ETX "%01<xor>";
}
setLowSpeedFrequency {
    out STX $addr "\x31\x31\x37" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getLowSpeedFrequency; }
}

# Target Frequency configuration
# (sets the desired rotational frequency of the pump when low-speed is not active)
# value = from low speed frequency to 1010 Hz
# factory default = 1010
# data format: 6 bytes
# (use ai/ao record)
getTargetFrequency {
    out STX $addr "\x31\x32\x30" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x32\x30" 0x30 "%06d" ETX "%01<xor>";
}
setTargetFrequency {
    out STX $addr "\x31\x32\x30" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getTargetFrequency; }
}

# Actual Driving Frequency command
# (read-only command)
# value = actual driving frequency in Hz
# read format: 6 bytes
# (use ai record)
getActualFrequency {
    out STX $addr "\x32\x30\x33" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x30\x33" 0x30 "%06d" ETX "%01<xor>";
}


###############
##### Active commands related to the vent valve

# Vent valve operation mode configuration
# (auto pump speed mode available for the FS model only)
# value = 0 for Automatic (i.e. controlled by the controller, closes after valve delay),
#	    1 for On Command (i.e. controlled by the serial port, closes when toggled off)
#       2 for Auto pump speed (i.e. controlled by the controller, taking into account the pump deceleration)
# factory default = Automatic
# data format: 1 byte
# (use bi/bo record)
getValveMode {
    out STX $addr "\x31\x32\x35" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x32\x35" 0x30 "%{0|1|2}" ETX "%01<xor>";
}
setValveMode {
    out STX $addr "\x31\x32\x35" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getValveMode; }
}

# Vent Valve Opening Delay configuration
# (time delay between stopping of the pump and opening of the vent valve)
# value = from 0 to 65535 counts with 1count=0.2sec (i.e. from 0 to 13107 sec)
# factory default = 3 counts
# data format: 6 bytes
# (use ai/ao record)
getValveDelay {
    out STX $addr "\x31\x32\x36" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x32\x36" 0x30 "%06d" ETX "%01<xor>";
}
setValveDelay {
    out STX $addr "\x31\x32\x36" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getValveDelay; }
}

# Vent Valve Opening Time configuration
# (time during which the valve stays in the OPEN state following the pump STOP command)
# (if 0, the valve is to be kept open indefinitely (until the next start))
# value = from 0 to 65535 counts with 1count=0.2sec (i.e. from 0 to 13107 sec)
# factory default = 0 count
# data format: 6 bytes
# (use ai/ao record)
getValveOpening {
    out STX $addr "\x31\x34\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x34\x37" 0x30 "%06d" ETX "%01<xor>";
}
setValveOpening {
    out STX $addr "\x31\x34\x37" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getValveOpening; }
}

# Vent Valve Control configuration
# (sets the vent valve on or off)
# (write only if valve operation WIN125 is 'On command')
# value = 0 for Off/Closed, 1 for On/Opened
# factory default = 0 for the IC model, 1 for the FS model
# data format: 1 byte
# (use bi/bo record)
getValveState {
    out STX $addr "\x31\x32\x32" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x32\x32" 0x30 "%{0|1}" ETX "%01<xor>";
}
setValveState {
    out STX $addr "\x31\x32\x32" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getValveState; }
}

# Vent Valve type
# (available to IC model only)
# (sets the type of valve connected to the pump)
# (write only if the pump is stopped WIN000 and the controller is in serial mode WIN008)
# value = 0 for Normally Closed, 1 for Normally Open
# factory default = 1
# data format: 1 byte
# (use bi/bo record)
getValveType {
    out STX $addr "\x31\x34\x30" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x34\x30" 0x30 "%{0|1}" ETX "%01<xor>";
}
setValveType {
    out STX $addr "\x31\x34\x30" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getValveType; }
}


################
##### Active commands related to the gauge

# Gauge Gas Type configuration
# (available to FS model only)
# value = 0 for Not Configured, 1 for Nitrogen, 2 for Argon, 3 for Hydrogen, 4 for Other
# factory default = 0
# data format: 6 bytes
# (use mbbi/mbbo record)
getGaugeGasType {
    out STX $addr "\x31\x38\x31" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x38\x31" 0x30 "\x30\x30\x30\x30\x30%{0|1|2|3|4}" ETX "%01<xor>";
}
setGaugeGasType {
    out STX $addr "\x31\x38\x31" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugeGasType; }
}

# Gauge Correction Factor configuration
# (correction factor of the pressure measurement for custom gauge (WIN181=4))
# (Pressure indicated by  instrument = Pressure measured * Gas correction / 10)
# (available to FS model only)
# value = from 10 to 999
# factory default = ---
# data format: 6 bytes
# (use ai/ao record)
getGaugeCFactor {
    out STX $addr "\x31\x38\x32" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x38\x32" 0x30 "%06d" ETX "%01<xor>";
}
setGaugeCFactor {
    out STX $addr "\x31\x38\x32" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugeCFactor; }
}

# Gauge Power Mode configuration
# (used to turn off the gauge at certain condition)
# (available to FS model only)
# value = 0 for No Power (i.e. gauge Off),
#       1 for Power On Always (i.e. gauge On),
#       2 for Power On Setpoint1 (i.e. normally Off but turns On when R1 setpoint is activated),
#       3 for Power On Setpoint2 (i.e. normally Off but turns On when R2 setpoint is activated),
#       4 for Power On Setpoint3 (i.e. normally Off but turns On when gauge setpoint is activated)
# (for values 2, 3 and 4, if the set point type is 'Pressure', then the gauge is always On)
# factory default = ---
# data format: 6 bytes
# (use mbbi/mbbo record)
getGaugePowerMode {
    out STX $addr "\x32\x36\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x36\x37" 0x30 "\x30\x30\x30\x30\x30%{0|1|2|3|4}" ETX "%01<xor>";
}
setGaugePowerMode {
    out STX $addr "\x32\x36\x37" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugePowerMode; }
}

# Gauge Setpoint Type configuration
# (available to FS model only)
# value = 0 for Frequency, 1 for Power, 2 for Time, 3 for Normal
# factory default = 3
# data format: 6 bytes
# (use mbbi/mbbo record)
getGaugeSPtType {
    out STX $addr "\x31\x33\x36" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x33\x36" 0x30 "\x30\x30\x30\x30\x30%{0|1|2|3}" ETX "%01<xor>";
}
setGaugeSPtType {
    out STX $addr "\x31\x33\x36" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugeSPtType; }
}

# Gauge Setpoint Logic configuration
# (available to FS model only)
# (control logic activation type for the setpoint output signal)
# (positive logic = the relay is energized when the measurement exceeds the reference)
# (negative logic = the relay is energized when the measurement is below the reference)
# ("high-level active" indicates the output is ON when the signal is above the threshold)
# value = 0 for High-level active, 1 for Low-level active
# factory default = High-level
# data format: 1 byte
# (use bi/bo record)
getGaugeSPtLogic {
    out STX $addr "\x31\x33\x39" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x33\x39" 0x30 "%{0|1}" ETX "%01<xor>";
}
setGaugeSPtLogic {
    out STX $addr "\x31\x33\x39" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugeSPtLogic; }
}

# Gauge Setpoint Threshold configuration
# (available to FS model only)
# value = from 0 to 999999, expressed in Hz/W/sec/mbar
# factory default = 867
# data format: 6 bytes
# (use ai/ao record)
getGaugeSPtThreshold {
    out STX $addr "\x31\x33\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x33\x37" 0x30 "%06d" ETX "%01<xor>";
}
setGaugeSPtThreshold {
    out STX $addr "\x31\x33\x37" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugeSPtThreshold; }
}

# Gauge Setpoint Delay configuration
# (available to FS model only)
# (time between the pump start and the setpoint check)
# value = from 0 to 999999 seconds
# factory default = 0
# data format: 6 bytes
# (use ai/ao record)
getGaugeSPtDelay {
    out STX $addr "\x31\x33\x38" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x33\x38" 0x30 "%06d" ETX "%01<xor>";
}
setGaugeSPtDelay {
    out STX $addr "\x31\x33\x38" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getGaugeSPtDelay; }
}

# Gauge Setpoint Hysteresis configuration
# (available to FS model only)
# value = from 0 to 100, expressed in % of the gauge threshold value
# factory default = 2
# data format: 6 bytes
# (use ai/ao record)
getGaugeSPtHysteresis {
    out STX $addr "\x31\x34\x30" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x34\x30" 0x30 "%06d" ETX "%01<xor>";
}
setGaugeSPtHysteresis {
    out STX $addr "\x31\x34\x30" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init {getGaugeSPtHysteresis; }
}

# Gauge Status Code command
# (command only available to FS model with gauge connected) 
# value = gauge status
# read format: 6 bytes 
# (use ai record)
getGaugeStatus {
    out STX $addr "\x32\x35\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x35\x37" 0x30 "\x30\x30\x30\x30%02d" ETX "%01<xor>";
}


