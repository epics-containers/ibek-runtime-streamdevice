# R2 Setpoint Hysteresis configuration
# (only available for the FS model)
# value = from 0 to 100, expressed in % of the R2 threshold value
# factory default = 2
# data format: 6 bytes
# (use ai/ao record)
getR2SetpointHysteresis {
    out STX $addr "\x31\x37\x35" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x37\x35" 0x30 "%06d" ETX "%01<xor>";
}
setR2SetpointHysteresis {
    out STX $addr "\x31\x37\x35" 0x31 "%06d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init {getR2SetpointHysteresis; }
}

# R2 Setpoint Pressure Threshold command
# (read-only, reports the actual pressure setpoint value if WIN101 is set to Pressure)
# (only available for the FS model with the Gauge connected)
# value = X.X EsXX with X= 0 to 9 and s= + or -)
# read format: 10 bytes
