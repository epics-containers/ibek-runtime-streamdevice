###############
##### Active commands that relate to general pump settings

# Serial Type Selection configuration
# (requires modification of Moxa terminal server settings too!)
# (command available to FS model only)
# value = 0 for RS232, 1 for RS485
# factory default = RS232
# data format: 1 byte
# (use bi/bo record)
getSerialType {
    out STX $addr "\x35\x30\x34" 0x30 ETX "%01<xor>";
    in STX $addr "\x35\x30\x34" 0x30 "%{0|1}" ETX "%01<xor>";
}
setSerialType {
    out STX $addr "\x35\x30\x34" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getSerialType; }
}

# Serial baud rate configuration
# (Moxa terminal server settings must be changed too!)
# (communication speed above 9600bit/s only available for IC model)
# value = 0 for 600bit/s, 1 for 1200bit/s, 2 for 2400bit/s, 3 for 4800bit/s,
#	4 for 9600bit/s, 5 for 19200bit/s, 6 for 38400bit/s
# factory default = 9600bit/s
# data format: 6 bytes
# (use mbbi record)
getBaudRate {
    out STX $addr "\x31\x30\x38" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x30\x38" 0x30 "\x30\x30\x30\x30\x30%{0|1|2|3|4|5|6}" ETX "%01<xor>";
}
setBaudRate {
    out STX $addr "\x31\x30\x38" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getBaudRate; }
}

# Interlock type configuration
# (P1 input connector, pin3)
# (operating mode of the interlock input when controller is set to 'START-INTERLOCK' mode on the front panel)
# (impulse mode = interlock input active only at the time of starting; later de-activation of the interlock has no impact)
# (continuous = interlock input constantly active; de-activation of the interlock interrupts the driving of the pump)
# value = 0 for Impulse, 1 for Continuous 
# factory default = Continuous for IC model, Impulse for FS model
# data format: 1 byte
# (use bi/bo record)
getInterlock {
    out STX $addr "\x31\x31\x30" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x31\x30" 0x30 "%{0|1}" ETX "%01<xor>";
}
setInterlock {
    out STX $addr "\x31\x31\x30" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getInterlock; }
}

# Start Output configuration
# (establishes the required pump status to activate the start output)
# (configurable start output used with logic output connector J1, pin13 and pin6)
# (available to FS model only)
# value = 0 for Starting (i.e. output is active only during acceleration ramp-up),
#        1 for Running (i.e. output is active when the pump is driven)
# factory default = Starting
# data format: 1 byte
# (use bi/bo record)
getStartOutput {
    out STX $addr "\x31\x37\x37" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x37\x37" 0x30 "%{0|1}" ETX "%01<xor>";
}
setStartOutput {
    out STX $addr "\x31\x37\x37" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getStartOutput; }
}

# Analog Output type configuration
# (J1 logic output connector, pin2)
# (selects the type of output voltage signal to be sent to the programmable analogue output)
# (e.g. drive frequency of the pump, power supplied to the pump, temperature of the pump or pressure read by the gauge)
# (aditional Pressure type for the FS model only)
# value = 0 for Frequency, 1 for Power, 2 for Temperature, 3 for Pressure
# factory default = Frequency for IC model, Power for FS model
# data format: 6 bytes
# (use ai/ao record)
getAOType {
    out STX $addr "\x31\x31\x31" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x31\x31" 0x30 "\x30\x30\x30\x30\x30%{0|1|2|3}" ETX "%01<xor>";
}
setAOType {
    out STX $addr "\x31\x31\x31" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getAOType; }
}

# Pressure Unit command
# (sets the unit of measurement for pressure readings on the serial line and on the display)
# (available to FS model only)
# value = 0 for mbar, 1 for Pascal, 2 for Torr
# factory default = 0
# data format: 6 bytes
# (use mbbi/mbbo record)
getPressureUnit {
    out STX $addr "\x31\x36\x33" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x36\x33" 0x30 "\x30\x30\x30\x30\x30%{0|1|2}" ETX "%01<xor>";
}
setPressureUnit {
    out STX $addr "\x31\x36\x33" 0x31 "\x30\x30\x30\x30\x30%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getPressureUnit; }
}

# Maximum Power Limit command
# (reads the maximum DC power deliverable to the pump)
# (available to FS model only)
# value = from 0 to 999 watts
# read format: 6 bytes
# (use ai record)
getPumpMaxPower {
    out STX $addr "\x31\x35\x35" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x35\x35" 0x30 "%06d" ETX "%01<xor>";
}

# Pump temperature command
# (returns the current temperature of the outer ring of the upper bearing on the pump)
# value = from 0 to 99 degree celsius
# read format: 6 bytes
# (use ai record)
getPumpTemp {
    out STX $addr "\x32\x30\x34" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x30\x34" 0x30 "%06d" ETX "%01<xor>";
}

# Pressure Reading command
# (reads the current pressure delivered by the pump)
# (available to FS model only and with the gauge connected)
# value = power value in mbar|Pascal|Torr (see WIN163) with format X.X E XX
# read format: 10 bytes
# (use stringin record)
getPumpPressure {
    out STX $addr "\x32\x32\x34" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x32\x34" 0x30 "%10c" ETX "%01<xor>";
}

# Pump Rotation Frequency command
# (returns the rotational speed of the pump as a function of the controller output frequency)
# (read-only, available to FS model only)
# value = rotation frequency in rpm
# read format: 6 bytes
# (use ai record)
getPumpRotation {
    out STX $addr "\x32\x32\x36" 0x30 ETX "%01<xor>";
    in STX $addr "\x32\x32\x36" 0x30 "%06d" ETX "%01<xor>";
}

# RS485 Device configuration
# (defines the serial address in RS485 communication)
# value = device number from 0 to 31
# factory default = 0
# data format: 6 bytes
# (use ai/ao record)
getRS485Device {
    out STX $addr "\x35\x30\x33" 0x30 ETX "%01<xor>";
    in STX $addr "\x35\x30\x33" 0x30 "\x30\x30\x30\x30%02d" ETX "%01<xor>";
}
setRS485Device {
    out STX $addr "\x35\x30\x33" 0x31 "\x30\x30\x30\x30%02d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getRS485Device; }
}

# RunUp Time Control configuration
# (the pump is allowed to spin at a speed value less than the normal operating speed (700Hz)) 
# value = 0 for Off, 1 for On
# factory default = On
# data format: 1 byte
# (use bi/bo record)
getRunUpControl {
    out STX $addr "\x37\x32\x35" 0x30 ETX "%01<xor>";
    in STX $addr "\x37\x32\x35" 0x30 "%{0|1}" ETX "%01<xor>";
}
setRunUpControl {
    out STX $addr "\x37\x32\x35" 0x31 "%x" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getRunUpControl; }
}

# RunUp Time configuration
# (maximum amount of low speed time allowed before the pump stop and 'Run Up Time' error appears)
# value = from 0 to 30 minutes
# factory default = 15
# data format: 6 bytes
# (use ai/ao record)
getRunUpTime {
    out STX $addr "\x37\x32\x34" 0x30 ETX "%01<xor>";
    in STX $addr "\x37\x32\x34" 0x30 "\x30\x30\x30\x30%02d" ETX "%01<xor>";
}
setRunUpTime {
    out STX $addr "\x37\x32\x34" 0x31 "\x30\x30\x30\x30%02d" ETX "%01<xor>";
    in STX $addr ACK ETX "%01<xor>";
    @init { getRunUpTime; }
}


