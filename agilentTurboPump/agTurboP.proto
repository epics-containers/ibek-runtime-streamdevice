getR2SetpointThreshold {
    out STX $addr "\x31\x37\x32" 0x30 ETX "%01<xor>";
    in STX $addr "\x31\x37\x32" 0x30 "%06d" ETX "%01<xor>";
}
setR2SetpointThreshold {
    out STX $addr "\x31\x37\x32" 0x31 "%06d" ETX "%01<xor>";
