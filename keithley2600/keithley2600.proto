# streamDevice protocol file for Keithley 2600 series meter
# author: Mariano Ruiz-Rodriguez <ruizmm@ornl.gov>

InTerminator = '\n';
OutTerminator = '\r\n';
# MaxInput = 0;
# LockTimeout should be GT ReplyTimeout
LockTimeout = 5000;
ReplyTimeout = 3000;
ReadTimeout = 100;
PollPeriod = 1000;
ExtraInput = Ignore;

read_boolno? {
    out "\$1"; in "%{true|false}";
}

read_floatno? {
    out "\$1"; in "%f";
}


read_float {
    out "\$1?"; in "%f";
}

write_float {
    out "\$1\_%.6g";
#    @init{ read_float; }
}

write_floatnospace {
    out "\$1%.6g";
#    @init{ read_float; }
}



read_int {
    out "\$1?"; in "%i";
}

read_intno? {
    out "\$1"; in "%i";
}



write_int {
    out "\$1\_%d";
#    @init{ read_int;}
}

read_string {
    out "\$1?"; in "%s";
}


read_stringno? {
    out "\$1"; in "%s";
}

read_lineno? {
    out "\$1"; in "%[^\r\n]";
}



write_string {
    out "\$1\_%s";
#    @init{ read_string;}
}

write_stringnospace {
    out "\$1%s";
#    @init{ read_string;}
}



write_stringwquotes {
    out "\$1\_\"%s\"";
#    @init{ read_string;}
}

clear_error_queue {
    out "errorqueue.clear()";
}



#readerrorcode {
#    out "print(errorqueue.next())"; in "%f\t%*#s" 
#}


readerrorcount {
    out "print(errorqueue.count)"; in "%f" 
}


readerrorstr {
#    out "print(errorqueue.next())"; in "%*f\t%#s"          
    out "print(errorqueue.next())"; in "%#s"          
}

readerrorcode {
    in "%f\t%*#s";
}
readerrormsg {
#    in "%*f\t%s\t";
    in "%*f\t%[^\t]\t";
}
readerrorsevr {
#    in "%*f\t%*s\t%f";
    in "%*f\t%*[^\t]\t%f";
}
readerrornode {
#    in "%*f\t%*s\t%*f\t%f";
    in "%*f\t%*[^\t]\t%*f\t%f";
}

read_statmino? {
    out "print(status.measurement.instrument.\$1)"; in "%f";
}


write_measirangsp{
    out "\$1%{0.000001|0.000010|0.000100|0.001000|0.100000|1.5}";
}


write_measvrangsp {
    out "\$1%{0.2|2.0|20.0|200.0}"; 
}


write_sourcevrangsp{
    out "\$1%{0.2|2.0|20.0|200.0}";
}

write_sourceirangsp{
    out "\$1%{0.000001|0.000010|0.000100|0.001000|0.100000|1.5}";
}

write_getstats{
    out "statistics=\$1.buffer.getstats(\$1.\$2)"
}

write_measolap{
    out "\$1.measure.overlappediv(\$1.\$2,\$1.\$3)"
}

write_appendmode {
    out "\$1.clear()";
    out "\$1.nvbuffer1.appendmode=\_%d";
#    @init{ read_int;}
}

wr_PVMISL {
    out "\$1.measure.autorangei=\_0";
    out "\$1.measure.autorangev=\_0";
    out "\$1.source.autorangei=\_0";
    out "\$1.source.autorangev=\_0";
    out "\$1.measure.autozero=\_1";
    out "\$1.nvbuffer1.clear()";
    out "\$1.nvbuffer1.appendmode=\_1";
    out "\$1.source.output=\_1";
    out "f1, msg1 = ConfigPulseVMeasureISweepLin(\$1, %(\$2:VSPR)f, %(\$2:SwVStart)f, %(\$2:SwVStop)f, %(\$2:ILimitRead)f, %(\$2:SwTmOn)f, %(\$2:SwTmOff)f, %(\$2:SwNPulses)d, \$1.nvbuffer1, \$3)";
#f1, msg1 = ConfigPulseVMeasureISweepLin(smu, biasV(PV VSP), startV, StopV, limitI(PV ILimit), ton, tof, points, buffer, tag)
#print(f1, msg1)
}

wr_PIMVSL {
    out "\$1.measure.autorangei=\_0";
    out "\$1.measure.autorangev=\_0";
    out "\$1.source.autorangei=\_0";
    out "\$1.source.autorangev=\_0";
    out "\$1.measure.autozero=\_1";
    out "\$1.nvbuffer1.clear()";
    out "\$1.nvbuffer1.appendmode=\_1";
    out "\$1.source.output=\_1";
    out "f1, msg1 = ConfigPulseIMeasureVSweepLin(\$1, %(\$2:ISPR)f, %(\$2:SwIStart)f, %(\$2:SwIStop)f, %(\$2:VLimitRead)f, %(\$2:SwTmOn)f, %(\$2:SwTmOff)f, %(\$2:SwNPulses)d, \$1.nvbuffer1, \$3)";
#f1, msg1 = ConfigPulseVMeasureISweepLin(smu, biasI(PV ISP), startI, StopI, limitI(PV VLimit), ton, tof, points, buffer, tag)
#print(f1, msg1)
}

write_runPulse {
    out"f1, msg1 = InitiatePulseTest(\$1)";
#    out "print(f1, msg1)"
}

#Restores default config after a Pulse sweep
write_confDef {
    out "\$1.measure.autozero=\_0";
    out "\$1.nvbuffer1.clear()";
    out "\$1.nvbuffer1.appendmode=\_0";
}

# The following is used to read the status returned by ConfigPulse... and InitiatePulse... commands. 
# If the keithey is busy successfully executing the command it will not repond hence the replytimeout to silence the error on the console
read_f1msg1 {
    out "print(f1,msg1)"; in "%{true|false}\t%(\S1:SwErrStr)[^\r\n]"; @replytimeout { };
}

read_wf {
    separator=","; 
    out "printbuffer(1,\$1.\$2.n,\$1.\$2)"; 
    in "%f";
} 
