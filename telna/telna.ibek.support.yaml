# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: telna

entity_models:
  - name: telna
    description: |-
      Reads out the 8 channel Telna temperature logger
    parameters:
      P:
        type: str
        description: |-
          Device Prefix
      PORT:
        type: str
        description: |-
          Asyn Port name
    databases:
      - file: telna.template
        args:
          .*:
