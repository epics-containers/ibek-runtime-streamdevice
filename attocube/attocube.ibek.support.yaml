# Imported from DLS production support module: attocube 1-8
# Source: /dls_sw/prod/R3.14.12.7/support/attocube/1-8
# Pristine copy of the StreamDevice protocol + EPICS db/template from that release.
# To check for updates: diff this pattern's files against that path, or against the
# newest /dls_sw/prod/*/support/attocube/ release.

module: attocube

entity_models:
  - name: ANC150
    description: |-
      Controls an attocube ANC150 pico motor controller
    parameters:
      P:
        type: str
        description: |-
          Device prefix
      M:
        type: str
        description: |-
          Motor suffix
      PORT:
        type: str
        description: |-
          Asyn port name
      AXIS:
        type: int
        description: |-
          Motor axis number
      name:
        type: id
        description: |-
          object and gui association name
    databases:
      - file: ANC150.template
        args:
          .*:
