# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: APD-ACE

entity_models:
  - name: APDACE
    description: |-
      APD ACE avalanche photodiode bias/control unit
    parameters:
      P:
        type: str
        description: |-
          Device name
      Q:
        type: str
        description: |-
          Device suffix
      PORT:
        type: str
        description: |-
          asyn port
      name:
        type: id
        description: |-
          Object and gui association name
    databases:
      - file: apd-ace.template
        args:
          .*:
