Terminator = NL;
ExtraInput = Ignore;
ReplyTimeout = 35000;
MaxInput = 8000000;

###########################################################################
# Function selection

meas_func_set{
	# set
	out "dmm.measure.func = dmm.FUNC_%{DC_VOLTAGE|AC_VOLTAGE|DC_CURRENT|AC_CURRENT|RESISTANCE|4W_RESISTANCE|ACV_FREQUENCY|ACV_PERIOD}";
}

meas_func_get{
	# read
	out "print(dmm.measure.func)";
	in "dmm.FUNC_%{NONE|DC_VOLTAGE|AC_VOLTAGE|DC_CURRENT|AC_CURRENT|RESISTANCE|4W_RESISTANCE|DIODE|CAPACITANCE|TEMPERATURE|CONTINUITY|ACV_FREQUENCY|ACV_PERIOD|DCV_RATIO}";
}

###########################################################################
# Autozero

azero_en_set{
	# set
	out "dmm.measure.autozero.enable = dmm.%{OFF|ON}";
}

azero_en_get{
	# read
	out "print(dmm.measure.autozero.enable)";
	in "dmm.%{OFF|ON}";
}

azero_once_set{
	# cmd
	out "dmm.measure.autozero.once()";
}

