# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: ETLdetector

entity_models:
  - name: ETLdetector
    description: |-
      Comms for ETL (SENS-tech) scintillator detector
    parameters:
      P:
        type: str
        description: |-
          Device prefix
      Q:
        type: str
        description: |-
          Device suffix
      addr:
        type: str
        description: |-
          Address on the bus in decimal (or hex with a 0x prefix)
      port:
        type: str
        description: |-
          Asyn port name
      name:
        type: id
        description: |-
          Object and gui association name
    databases:
      - file: ETLdetector.template
        args:
          .*:
