# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: mks647c

entity_models:
  - name: mks647cChan
    description: |-
      MKS 647C mass flow controller channel
    parameters:
      P:
        type: str
        description: |-
          Prefix for PV name
      Q:
        type: str
        description: |-
          Suffix for PV name
      PORT:
        type: str
        description: |-
          Bus/Port Address (eg. ASYN Port).
      CHAN:
        type: int
        description: |-
          Channel number
    databases:
      - file: mks647cChan.template
        args:
          .*:
