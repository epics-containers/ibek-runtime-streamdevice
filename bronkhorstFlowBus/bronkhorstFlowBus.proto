Terminator   = CR LF;

## Write setpoint
## \code
## send: :(len)(node)(write)(process)(param+type)(value)
##  e.g. : 06   03    01     01       21          3E80
##  sets setpoint to 16000 (50%)
## receive: :(len)(node)(00)(status)(errorloc)
##  e.g.    : 04   03    00  00      05
##  returns write OK
## \endcode
writeint { out ":06\$101\$2\$3%04X"; in ":04\$10000%*02X"; }

## Write setpoint
## \code
## send: :(len)(node)(read)(process)(index+type)(process)(param+type)
##  e.g. : 06   03    04    01       21          01       21
##  request for sp
## receive: :(len)(node)(02)(process)(index+type)(value)
##  e.g.    : 06   03    02  01       21          3E80
##  returns 1600 (50%)
## \endcode
readint { out ":06\$104\$2\$3\$2\$3"; in ":06\$102\$2\$3%04X"; }

writefloat {out ":08\$101\$2\$3%08X"; in ":04\$10000%*02X"; }
readfloat {out ":06\$104\$2\$3\$2\$3"; in ":08\$102\$2\$3%08X"; }

writechar {out ":05\$101\$2\$3%02X"; in ":04\$10000%*02X"; }
readchar {out ":06\$104\$2\$3\$2\$3"; in ":05\$102\$2\$3%02X"; }

readstring10 {out ":07\$104\$2\$3\$2\$30A"; in ":0F\$102\$2\$30A%[_a-zA-Z0-9]"; }

readstring7 {out ":07\$104\$2\$3\$2\$307"; in ":0C\$102\$2\$307%[_a-zA-Z0-9]"; }
