# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

# Imported from DLS production support module: microlab500 1-5
# Source: /dls_sw/prod/R3.14.12.7/support/microlab500/1-5
# Pristine copy of the StreamDevice protocol + EPICS db/template from that release.
# To check for updates: diff this pattern's files against that path, or against the
# newest /dls_sw/prod/*/support/microlab500/ release.

module: microlab500

entity_models:
  - name: microlab500
    description: |-
      Controls a Hamilton Microlab 500 series syringe pump
    parameters:
      P:
        type: str
        description: |-
          Device prefix
      R:
        type: str
        description: |-
          Device suffix
      PORT:
        type: str
        description: |-
          Asyn Port for communication with device
      LEFTSYRINGEVOL:
        type: float
        description: |-
          Left syringe volume (uL)
      RIGHTSYRINGEVOL:
        type: float
        description: |-
          Right syringe volume (uL)
      STROKESIZE:
        type: int
        description: |-
          Number of steps per full syringe stroke
      name:
        type: id
        description: |-
          object and gui association name
    databases:
      - file: microlab500whole.template
        args:
          .*:
