# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: SycosH-Hot

entity_models:
  - name: SycosH_Hot
    description: |-
      SycosH-Hot humidity generator controller
    parameters:
      P:
        type: str
        description: |-
          Device prefix
      Q:
        type: str
        description: |-
          Device suffix
      PORT:
        type: str
        description: |-
          Asyn port name
      name:
        type: id
        description: |-
          Object and gui association name
    databases:
      - file: SycosH-Hot.template
        args:
          .*:
