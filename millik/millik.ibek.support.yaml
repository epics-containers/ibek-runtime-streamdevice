# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

# Imported from DLS production support module: millik 1-2
# Source: /dls_sw/prod/R3.14.12.7/support/millik/1-2
# Pristine copy of the StreamDevice protocol + EPICS db/template from that release.
# To check for updates: diff this pattern's files against that path, or against the
# newest /dls_sw/prod/*/support/millik/ release.

module: millik

entity_models:
  - name: millik
    description: |-
      milliK precision temperature measurement device
    parameters:
      P:
        type: str
        description: |-
          Device Prefix
      R:
        type: str
        description: |-
          Device Suffix
      PORT:
        type: str
        description: |-
          Asyn Port name
      PREC:
        type: int
        description: |-
          Precision. Default is 4
        default: 4
    databases:
      - file: millik.template
        args:
          .*:
