##################################################
#
# Protocol File
#
# Protocol file for Lakeshore 218
# Diamond Light Source, October 2010
#
##################################################

##################################################
# General Settings
##################################################

Terminator = "\r\n";
ReplyTimeout = 1000;

###################################################
# Get functions
###################################################

# /// Read the device ID
getID {
   out "*IDN?";
   in "%s";
}

# /// Read the temperature in kelvin for inputs 1-4
getKRDG {
   out "KRDG? \$1";
   in "%f";
}

# /// Read the voltage input for inputs 1-4
getSRDG {
   out "SRDG? \$1";
   in "%f";
}

getAllKRDG {
    out "KRDG? 0";
    in "%f,%(\$2:KRDG2.VAL)f,%(\$2:KRDG3.VAL)f,%(\$2:KRDG4.VAL)f,%(\$2:KRDG5.VAL)f,%(\$2:KRDG6.VAL)f,%(\$2:KRDG7.VAL)f,%(\$2:KRDG8.VAL)f";
}

getAllSRDG {
    out "SRDG? 0";
    in "%f,%(\$2:SRDG2.VAL)f,%(\$2:SRDG3.VAL)f,%(\$2:SRDG4.VAL)f,%(\$2:SRDG5.VAL)f,%(\$2:SRDG6.VAL)f,%(\$2:SRDG7.VAL)f,%(\$2:SRDG8.VAL)f";
}


