module: tdklambda

entity_models:
  - name: Gen3300w
    description: |-
      TDK Lambda 3300W power supply
    parameters:
      P:
        type: str
        description: |-
          EPICS name prefix
      PORT:
        type: str
        description: |-
          asyn port
      CMDSET:
        type: str
