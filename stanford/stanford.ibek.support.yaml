# newest /dls_sw/prod/*/support/stanford/ release.

module: stanford

entity_models:
  - name: sr570
    description: |-
      Controls a Stanford SR570 current amplifier
    parameters:
      P:
        type: str
        description: |-
          Device prefix
      Q:
        type: str
        description: |-
          Device suffix
      PORT:
        type: str
        description: |-
          Asyn port for this device
      DESC:
        type: str
        description: |-
          Description for this device (displayed on EDM screen)
    databases:
      - file: sr570.template
        args:
          .*:
