##################################################
#
# Protocol File
#
# Protocol file for ISEG HV PSU (model NHQ x0xx)
# Diamond Light Source, Aug 2009
#
# NOTES:
# The unit echos back each character before sending a response to
# a command. So to read the status for channel 1 for example:
# Out: S
# In: S
# Out: 1
# In: 1
# Out: \r
# In: \r
# Out: \n
# In: \nS1=ON
# Now the next command can be started.
#
##################################################


##################################################
# General Settings
##################################################

#Terminator = "\r\n";  #<CR><LF>  or   0x0D 0x0A
ReplyTimeout = 5000;
OutTerminator = "";
InTerminator = "";
ReadTimeout = 200;

writeDelay = 10;

##################################################
# Get functions
##################################################


# /// Read the actual current on channel N
# Note mismatch handler required because %m doesnt handle '0000-08' which iseg returns for 0 value sometimes.
getIActual {
   MaxInput=1;
   out "I";
   in "I";
   out "\$1";
   in "\$1";
   out "\r";
   in "\r";
   out "\n";
   MaxInput=0;
   in "\n%m\r\n"; @mismatch {in "\n%d%*3c\r\n";}
}
