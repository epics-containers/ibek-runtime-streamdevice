module: ODPsu

entity_models:
  - name: ODPsu
    description: |-
      ODPsu power supply control
    parameters:
      P:
        type: str
        description: |-
          device name prefix (name will be $(P)$(Q))
      Q:
        type: str
        description: |-
          device name qualifier (name will be $(P)$(Q))
      PORT:
        type: str
        description: |-
          Asyn port name
    databases:
      - file: ODPsu.template
        args:
          .*:

  - name: ODPsuV2
