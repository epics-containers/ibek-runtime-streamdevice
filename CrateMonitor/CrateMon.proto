# Streams protocol file for the CrateMonitor protocol
# Initial version PH 03/2006
# Polyrack extensions PH 11/2011
# Polyrack PSU status & crate type PH 03/2013
# Elma extensions for PSU status PH 08/2018

# use "streamReload" to reload this file without restarting the IOC

ExtraInput = Ignore;
ReadTimeout = 1000;
ReplyTimeout = 60000;

Terminator = CR;
term = ",%0<xor>";

# Read the supply voltages

supply
{
	Separator = ",";
	out "V,7A";
	in "v,%(A)x,%(B)x,%(C)x,%(D)x",$term;
}

# Read the fan speeds

fans
{
	Separator = ",";
	out "Y,75";
	in "y,%(A)x,%(B)x,%(C)x,%(D)x,%(E)x,%(F)x,%(G)x,%(H)x",$term;
}

# Read the status bits

status
{
	out "S,7F";
	in "s,%x",$term;
	
	@mismatch
	{
		in "VME PF:%*d/%*d";
	}
}

# Read the temperatures

temps
{
	Separator = ",";
	out "T,78";
	in "t,%(A)x,%(B)x,%(C)x",$term;
}

# Perform a reset

reset
{
	out "R,7E";
	in "r",$term;
}

# Perform a shut down

shutdown
{
	out "X,74";
	in "x",$term;
}

# Change fan speed and temperature limits

#	bits map of fans to test
#	high speed fans
#	high speed fans lower limit
#	low speed fans lower limit
#	max temp of any sensor
#	max delta temp between any two sensors

limits
{
	out "M,7F,70,2134,0DAC,20,05",$term;
	in "m",$term;
}

# enable the eighth fan for PSU status

elma_psu_limits
{
	out "M,FF,70,2134,0DAC,20,05",$term;
	in "m",$term;
}

# Change voltage limits

#supplylimits
#{
#	out "L,$1,<lower>,<upper>",$term;
#	in "l",$term;
#}

# wake up

wakeup
{
	out, "W,7B";
	in "w",%term;
}

