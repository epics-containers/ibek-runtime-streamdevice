# New commands for SMC-2 controller

getPSUstatus
{
	ReplyTimeout = 1000;

	out, "Z,3",$term;
	in "z,3,%d",$term;
}

setConfig
{
	ReplyTimeout = 1000;
	
	out, "Z,1,1,1,2",$term;
	in "z,1",$term;
}

getConfig
{
	out, "I,65",$term;
	in "i,186818,%(A)d,%(B)d,%(C)d,%(D)d",$term;
	
# old PolyRack firmware version

	@mismatch
	{
		in "i,186818,%(A)d,%(B)d",$term;
	}
}

# VME PF:x/y, VME_START
