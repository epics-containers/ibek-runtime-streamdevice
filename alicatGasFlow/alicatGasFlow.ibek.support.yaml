# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: alicatGasFlow

entity_models:
  - name: alicatGasFlow
    description: |-
      Alicat gas flow meter
    parameters:
      name:
        type: id
        description: |-
          Object name
      P:
        type: str
        description: |-
          Device prefix 1
      S:
        type: str
        description: |-
          Device prefix 2
      PORT:
        type: str
        description: |-
          Asyn port name
      HIHI:
        type: float
        description: |-
          Flow Alarm HIHI
      HIGH:
        type: float
        description: |-
          Flow Alarm HIGH
      LOLO:
        type: float
        description: |-
          Flow Alarm LOLO
      LOW:
        type: float
        description: |-
          Flow Alarm LOW
      SHTR:
        type: str
        description: |-
          Shutter
    databases:
      - file: alicatGasFlow.template
        args:
          .*:
  - name: alicatPressureCtrl
    description: |-
      Alicat pressure controller
    parameters:
      name:
        type: id
        description: |-
          Object name
      P:
        type: str
        description: |-
          Device prefix 1
      Q:
        type: str
        description: |-
          Device prefix 2
      PORT:
        type: str
        description: |-
          Asyn port name
      HIHI:
        type: float
        description: |-
          Pressure Alarm HIHI
      HIGH:
        type: float
        description: |-
          Pressure Alarm HIGH
      LOLO:
        type: float
        description: |-
          Pressure Alarm LOLO
      LOW:
        type: float
        description: |-
          Pressure Alarm LOW
      MAXP:
        type: float
        description: |-
          Maximum pressure
      SCALE:
        type: float
        description: |-
          Set to 1 if your alicat is in the same scale units as EPICS
        default: 68.9465
    databases:
      - file: alicatPressureCtrl.template
        args:
          .*:
  - name: alicatMassCtrl
    description: |-
      Alicat mass flow controller
    parameters:
      name:
        type: id
        description: |-
          Object name
      P:
        type: str
        description: |-
          Device prefix 1
      Q:
        type: str
        description: |-
          Device prefix 2
      PORT:
        type: str
        description: |-
          Asyn port name
      HIHI:
        type: float
        description: |-
          Pressure Alarm HIHI
      HIGH:
        type: float
        description: |-
          Pressure Alarm HIGH
      LOLO:
        type: float
        description: |-
          Pressure Alarm LOLO
      LOW:
        type: float
        description: |-
          Pressure Alarm LOW
      MAXF:
        type: float
        description: |-
          Maximum flow default 100 (for LoopVar = Mass or Volumetric)
        default: 100
      MAXP:
        type: float
        description: |-
          Maximum pressure default 160 (for LoopVar = Pressure)
        default: 160
      SCALE:
        type: float
        description: |-
          Scaling between unit EGU and bar (default 0.068948 for unit reporting in PSI, but some units report pressure in bar).
        default: 0.068948
      NUMGASES:
        type: int
        description: |-
          Number of defined gases default 30
        default: 30
      GASNUM00:
        type: int
        description: |-
          Number of gas00 default 0
        default: 0
      GASNAME00:
