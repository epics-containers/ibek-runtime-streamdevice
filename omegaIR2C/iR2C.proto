# Protocol file for omega iR2C Pyrometer

# NB unit on I06 occasionally shows a 4.2 sec response time hence the large replyTimeout.
# (Response time is usually a few hundred milliseconds.)

Terminator = CR;

LockTimeout = 7000;
ReplyTimeout = 5000;
ReadTimeout = 100;
ExtraInput = Ignore;

# W-Class and R-Class commands: Hexadecimal data
# link usage: Write( <addr e.g. 01>, <command index e.g. 01>, <#char (2,4,or 6)>)
# link usage: Read( <addr e.g. 01>, <command index e.g. 01>, <#char (2,4,or 6)>)
#    where <addr> and <command index> are zero-padded 2 digits (e.g. for SP1,
#    <command index>=01, NOT 1).
Write {
	out "*\$1W\$2%0\$3X";
#	  in "\$1W\$2";	# command ack
	  in "%*[0-9]W\$2";	# command ack
	@init {
		out "*\$1R\$2";
#		  in "\$1R\$2%0\$3X";
		  in "%*[0-9]R\$2%0\$3X";
		# in "%X";
	}
}
Read {
	out "*\$1R\$2";
#	  in "\$1R\$2%0\$3X";
	  in "%*[0-9]R\$2%0\$3X";
	# in "%X";
}

# P-Class and G-Class commands: Hexadecimal data
# link usage: Put( <addr e.g. 01>, <command index e.g. 01>, <#char (2,4,or 6)>)
# link usage: Get( <addr e.g. 01>, <command index e.g. 01>, <#char (2,4,or 6)>)
#    where <addr> and <command index> are zero-padded 2 digits (e.g. for SP1,
#    <command index>=01, NOT 1).
Put {
	out "*\$1P\$2%0\$3X";
#	  in "\$1P\$2";	# command ack
	  in "%*[0-9]P\$2";	# command ack
	@init {
		out "*\$1G\$1";
#		  in "\$1G\$2%0\$3X";
		  in "%*[0-9]G\$2%0\$3X";
		# in "%X";
	}
}
Get {
	out "*\$1G\$2";
#	  in "\$1G\$2%0\$3X";
	  in "%*[0-9]G\$2%0\$3X";
	# in "%X";
}

# X-,V-,U-Class commands: no data to device, device returns string or 
# decimal data
# link usage: Recv( <addr e.g. 01>, <command>, <command index>) for decimal data
# link usage: RecvStr( <addr e.g. 01>, <command>, <command index>) for string data
#    where <command index> is zero-padded 2 digits (e.g. for SEND READING,
#    <command index>=01, NOT 1), and <command> is X, V, or U.
Recv {
	out "*\$1\$2\$3";
#	  in "\$1\$2\$3%f";
	  in "%*[0-9]\$2\$3%f";
	# in "%f";
}
RecvStr {
	out "*\$1\$2\$3";
#	  in "\$1\$2\$3%s";
	  in "%*[0-9]\$2\$3%s";
	# in "%s";
}

# D-,E-,Z-Class commands: no data
# link usage: Cmd( <addr e.g. 01>, <command>, <command index>)
#    where <command index> is zero-padded 2 digits (e.g. for STANDBY,
#    <command index>=03, NOT 3), and <command> is D, E, or Z.
Cmd {
	out "*\$1\$2\$3";
#	  in "\$1\$2\$3";	#command ack
	  in "%*[0-9]\$2\$3";	#command ack
}

# D E (enable/disable) specific commands
# link usage: Enable( <addr e.g. 01>, <command index>)
#   PV value of 0 will disable and 1 will enable
Enable {
    out "*\$1%{D|E}\$2";
#      in "\$1%{D|E}\$2";
      in "%*[0-9]%{D|E}\$2";
}

# Error Messages: arbitrary, usually in response of command: "?##"
# link usage: Error
# Be sure to set SCAN field to "I/O Intr"
Error {
	in "?%d";
}

