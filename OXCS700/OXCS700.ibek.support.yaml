# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: OXCS700

entity_models:
  - name: OXPH700
    description: |-
      Control for Oxford cryostream 700 series (Phenix)
    parameters:
      P:
        type: str
        description: |-
          Device Prefix
      Q:
        type: str
        description: |-
          Device suffix
      PORT:
        type: str
        description: |-
          Asyn port to connect to
      name:
        type: id
        description: |-
          Object and gui association name
      DISABLE_COMMS:
        type: int
        description: |-
          Optional macro to control whether comms are disabled (1) or not (0) on startup. Defaults to disabled
        default: 1
    databases:
      - file: OXPH700.template
        args:
          .*:
