# digitelSpc.proto
# Stream Device Protocol for Gamma Vacuum Digitel SPC
#
#
# Message format is:
#      <START>" "<ADR>" "<CMD>" "<DATA>" "<CKSUM><TERM>
# where
#      <START> : Start character(1 byte) = '~'
#      <ADR>   : Address(2 bytes) - address of unit in hex (defalut = 05)
#      <CMD>   : Command code (2 bytes) - hex
#      <DATA>  : Optional - depends on <CMD>
#      <CHK>   : Checksum (2 bytes) - hex
#      <TERM>  : Terminator character (1 byte) = '\r'
#
# Reply format is:
#      <ADR>" "<STA>" "<CODE>" "<DATA>" "<CKSUM><TERM>
# where
#      <ADR>   : Address(2 bytes) - address of unit in hex (default = 05)
#      <STA>   : Status Mnemonic(2 bytes) "OK" or "ER"
#      <CODE>  : Response code(2 bytes) Error number
#      <DATA>  : Optional - depends on <CMD>
#      <CHK>   : Checksum (2 bytes) - hex
#      <TERM>  : Terminator character (1 byte) = '\r'
#
# Arguments:
# $1 = address: (2 hex digits - default 05){1|2|3|4}


locktimeout = 5000;
terminator   = CR;
replytimeout = 1000;
readtimeout  = 1000;
extrainput   = Ignore;

#
# Controller Protocols
#
model     { out "~ \$1 01 %01<sum8>"            ; in "\$1 OK %*2x %[^0-9.]"            ; }
version   { out "~ \$1 02 %01<sum8>"            ; in "\$1 OK %*2x %*s %*s %s %0<sum8>" ; }
autost    { out "~ \$1 34 %01<sum8>"            ; in "\$1 OK %*2x %{NO|YES|POWER} %0<sum8>"  ; }
setautost { out "~ \$1 33 %{NO|YES|POWER} %01<sum8>"  ; in "\$1 OK %*2x %0<sum8>"            ; }
reset     { out "~ \$1 07 %01<sum8>"            ; }

#
# Ion Pump Protocols
#
current   { out "~ \$1 0A %01<sum8>"        ; in "\$1 OK %*2x %g %*{AMPS|Amps} %0<sum8>"    ; }
pressure  { out "~ \$1 0B %01<sum8>"        ; in "\$1 OK %*2x %g%*s %0<sum8>"      ; }
voltage   { out "~ \$1 0C %01<sum8>"        ; in "\$1 OK %*2x %d %0<sum8>"         ; }
##status    { out "~ \$1 0D \$2 %01<sum8>"        ; in "\$1 OK %*2x %{X|W|ST|SA|R|CO|P|H|I|SH|CA}" ; }
##status    { out "~ \$1 0D %01<sum8>"        ; in "\$1 OK %*2x %[ a-zA-Z]" ; }
status    { out "~ \$1 0D %01<sum8>"        ; in "\$1 OK %*2x %#s" ; }
##err       { out "~ \$1 0D \$2 %01<sum8>"        ; in "\$1 OK %*2x %*[^0-9]%d %0<sum8>" ; }
size      { out "~ \$1 11 %01<sum8>"        ; in "\$1 OK %*2x %d L/S %0<sum8>"     ; }
cal       { out "~ \$1 1D %01<sum8>"        ; in "\$1 OK %*2x %f %0<sum8>"         ; }
sps       { out "~ \$1 3C 01 %01<sum8>"        ; in "\$1 OK %*2x %*i,%*i,%g,%(\$2:SP2.VAL)g,%*i %0<sum8>"; }

setsize   { out "~ \$1 12 %d %01<sum8>"     ; in "\$1 OK %*2x %0<sum8>"            ; }
setcal    { out "~ \$1 1E %4.2f %01<sum8>"  ; in "\$1 OK %*2x %0<sum8>"            ; }
setsps    { out "~ \$1 3D 01,%1d, %(A)3.1E, %(B)3.1E %01<sum8>" ;
                                                  in "\$1 OK %*2x %0<sum8>"            ; }
#settext   { out "~ \$1 ED 01,%s %01<sum8>"     ; in "\$1 OK %*2x %0<sum8>"            ; }
# ignore errors from old syle units that do not implement this protocol
settext   { out "~ \$1 ED 01,%s %01<sum8>"     ; in "\$1 "                            ; }

start     { out "~ \$1 %{38|37} %01<sum8>"  ; in "\$1 OK %*2x %0<sum8>"            ; }


#debug
debug { ExtraInput = Ignore; out "~ %s %01<sum8>"; in "%*d %*{OK|ER} %*2x %s %0<sum8>";}








